title: Tech Blog
email: steven.liang@pm.me
description: >-
  Steven Liang's Tech Blog, focus on IT New Technology, e.g. CloudStack, Kubernetes, Cloud Native Architect.
twitter_username: 
github_username: bullblock
minimal_mistakes_skin: sunrise
search: true

markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Asia/Singapore

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Steven Liang"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "A guy who has his passion in new technology for more than 25 years..."
  links:
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/powellcrack"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/bullblock"

footer:
  links:
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/powellcrack"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/bullblock"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
